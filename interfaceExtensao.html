<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 240px;
      background: #0f111a; 
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0; padding: 16px;
    }
    
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 15px; border-bottom: 1px solid #1e293b; padding-bottom: 10px;
    }
    h3 { margin: 0; font-size: 16px; color: #a78bfa; font-weight: 700; }
    
    .form-group { margin-bottom: 12px; }
    label { 
      font-size: 10px; color: #a78bfa; display: block; margin-bottom: 4px;
      text-transform: uppercase; font-weight: bold; opacity: 0.8;
    }
    select { 
      width: 100%; padding: 8px; background: #1e1b2e; color: #f1f5f9; 
      border: 1px solid #4c1d95; border-radius: 6px; font-size: 13px; outline: none;
    }
    select:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* --- ESTILO BASE DO BOTÃO PRINCIPAL --- */
    #btnLigar {
      width: 100%; padding: 12px;
      border: none; border-radius: 8px; color: white; font-weight: bold;
      cursor: pointer; transition: 0.2s; margin-bottom: 12px;
    }
    #btnLigar:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    
    /* Estados do Botão Controlados pelo JS */
    .btn-desabilitado {
      opacity: 0.4 !important; 
      cursor: not-allowed !important; 
      background: #334155 !important; 
      filter: grayscale(1);
    }
    .btn-rodando {
      background: #ef4444 !important;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    .btn-parado {
      background: linear-gradient(135deg, #7c3aed, #5b21b6) !important;
    }

    /* --- FLUXO DE CONFIRMAÇÃO --- */
    .secao-confirmacao {
      display: none; /* Oculto por padrão, JS controla */
      border-radius: 8px; 
      margin-bottom: 15px;
      transition: all 0.2s ease;
    }
    .modo-pergunta {
      display: block;
      padding: 12px; text-align: center;
      background: #1e1b2e; border: 1px solid #8b5cf6;
    }
    .modo-aviso {
      display: block;
      padding: 8px; text-align: left;
      background: rgba(139, 92, 246, 0.1);
      border: none; border-left: 3px solid #8b5cf6;
    }
    
    .texto-pergunta { margin: 0 0 10px 0; font-size: 11px; color: #cbd5e1; }
    .texto-pergunta strong { color: #a78bfa; }
    
    .texto-destaque { margin: 0; color: #a78bfa; font-size: 10px; font-weight: bold; }

    .botoes-confirmacao { display: flex; justify-content: center; gap: 8px; }
    
    /* Botões Sim/Não */
    .btn-mini {
      padding: 5px 15px; border: none; border-radius: 4px; 
      font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    #btnSim { background: #8b5cf6; color: white; }
    #btnNao { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    #btnSim:hover { background: #7c3aed; }
    #btnNao:hover { background: rgba(255,255,255,0.05); color: white; }

    /* --- ALERTAS E UTILITÁRIOS --- */
    .alerta-box {
      display: none; font-size: 10px; padding: 8px; border-radius: 6px; 
      line-height: 1.4; font-weight: 500;
    }
    .alerta-erro { color: #f87171; background: rgba(248, 113, 113, 0.1); border-left: 3px solid #ef4444; }
    
    .oculto { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h3>Manga Loader</h3>
    <span style="font-size: 10px; opacity: 0.5;">v1.0</span>
  </div>

  <div id="secaoConfirmacao" class="secao-confirmacao">
    <p id="textoConfirmacao" class="texto-pergunta">O mangá está em <strong id="idiomaSugerido">---</strong>?</p>
    <div id="containerBotoesSimNao" class="botoes-confirmacao">
      <button id="btnSim" class="btn-mini">Sim</button>
      <button id="btnNao" class="btn-mini">Não</button>
    </div>
  </div>

  <div class="form-group">
    <label>Origem (Mangá)</label>
    <select id="selectOrigem" disabled>
      <option value="" disabled selected>Aguardando confirmação...</option>
      <option value="ja">Japonês (Mangá)</option>
      <option value="ko">Coreano (Manhwa)</option>
      <option value="zh">Chinês (Manhua)</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <div class="form-group">
    <label>Destino (Tradução)</label>
    <select id="selectIdioma">
      <option value="pt">Português</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>
  </div>

  <button id="btnLigar" class="btn-desabilitado" disabled>LIGAR E ATUALIZAR</button>

  <div id="alertaStatus" class="alerta-box alerta-erro"></div>

  <script type="module" src="auxiliarInterface.js"></script>
</body>
</html>
