<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    /* MANTENDO SEU CSS ORIGINAL */
    * { box-sizing: border-box; }
    body {
      width: 240px;
      background: #0f111a; 
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0; padding: 16px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 15px; border-bottom: 1px solid #1e293b; padding-bottom: 10px;
    }
    h3 { margin: 0; font-size: 16px; color: #a78bfa; font-weight: 700; }
    
    .form-group { margin-bottom: 12px; }
    label { 
      font-size: 10px; color: #a78bfa; display: block; margin-bottom: 4px;
      text-transform: uppercase; font-weight: bold; opacity: 0.8;
    }
    select { 
      width: 100%; padding: 8px; background: #1e1b2e; color: #f1f5f9; 
      border: 1px solid #4c1d95; border-radius: 6px; font-size: 13px; outline: none;
    }
    select:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
    
    /* ESTILO DO BOTÃO PRINCIPAL */
    #btnLigar {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none; border-radius: 8px; color: white; font-weight: bold;
      cursor: pointer; transition: 0.2s; margin-bottom: 12px;
    }
    #btnLigar:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    #btnLigar.ativo {
      background: #ef4444;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    #btnLigar:disabled {
      opacity: 0.4; cursor: not-allowed; background: #334155; filter: grayscale(1);
    }

    /* 🆕 AJUSTE: SEÇÃO DE CONFIRMAÇÃO (Tema Escuro) */
    #secaoConfirmacao {
      display: none; /* JS controla */
      background: #1e1b2e;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #8b5cf6;
      text-align: center;
    }
    #secaoConfirmacao p { margin: 0 0 10px 0; font-size: 11px; color: #cbd5e1; }
    #secaoConfirmacao strong { color: #a78bfa; }

    /* Botões Sim/Não pequenos e elegantes */
    .btn-mini {
      padding: 5px 15px; border: none; border-radius: 4px; 
      font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    #btnSim { background: #8b5cf6; color: white; margin-right: 5px; }
    #btnNao { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    #btnSim:hover { background: #7c3aed; }
    #btnNao:hover { background: rgba(255,255,255,0.05); color: white; }

    /* ALERTAS E OUTROS */
    .warning { 
      font-size: 10px; color: #fbbf24; background: rgba(251, 191, 36, 0.1); 
      padding: 8px; border-radius: 6px; border-left: 3px solid #fbbf24;
    }
    .alerta-box {
      display: none; font-size: 10px; padding: 8px; border-radius: 6px; 
      margin-top: 10px; line-height: 1.4; font-weight: 500;
    }
    .alerta-erro { color: #f87171; background: rgba(248, 113, 113, 0.1); border-left: 3px solid #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <h3>Manga Loader</h3>
    <span style="font-size: 10px; opacity: 0.5;">v1.0</span>
  </div>

  <div id="secaoConfirmacao">
    <p>O mangá está em <strong id="idiomaSugerido">---</strong>?</p>
    <div style="display: flex; justify-content: center;">
      <button id="btnSim" class="btn-mini">Sim</button>
      <button id="btnNao" class="btn-mini">Não</button>
    </div>
  </div>

  <div class="form-group">
    <label>Origem (Mangá)</label>
    <select id="selectOrigem" disabled>
      <option value="" disabled selected>Aguardando confirmação...</option>
      <option value="ja">Japonês (Mangá)</option>
      <option value="ko">Coreano (Manhwa)</option>
      <option value="zh">Chinês (Manhua)</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <div class="form-group">
    <label>Destino (Tradução)</label>
    <select id="selectIdioma">
      <option value="pt">Português</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>
  </div>

  <button id="btnLigar" disabled>LIGAR E ATUALIZAR</button>

  <div id="alertaStatus" class="alerta-box"></div>

  <script type="module" src="auxiliarInterface.js"></script>
</body>
</html>
