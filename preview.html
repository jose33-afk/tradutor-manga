<!DOCTYPE html>
<html>
<head>
    <title>Preview de Lotes</title>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .lote-container { 
            border: 4px solid yellow; /* A borda amarela que você pediu */
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .lote-info { color: white; background: rgba(0,0,0,0.7); position: absolute; top: 0; left: 0; padding: 5px; }
        img { display: block; max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div id="preview-root"></div>
    <script src="preview.js"></script>
</body>
</html>
